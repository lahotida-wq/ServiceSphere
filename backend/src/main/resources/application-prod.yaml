spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:service_sphere_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:BurnFT_008}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ServiceSphereProdPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

logging:
  level:
    root: WARN
    com.servicesphere: INFO

server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoint:
    health:
      show-details: never