# ServiceSphere/docker-compose.yml

version: '3.8'

services:

  # ── MySQL Database ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: servicesphere-mysql
    environment:
      MYSQL_ROOT_PASSWORD: BurnFT_008
      MYSQL_DATABASE: service_sphere_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"        # 3307 bahar, 3306 andar — conflict avoid karne ke liye
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - servicesphere-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pBurnFT_008"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servicesphere-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: service_sphere_db
      DB_USERNAME: root
      DB_PASSWORD: BurnFT_008
      JWT_SECRET: servicesphere-super-secret-jwt-key-2026-hackathon-min-256-bits
      JWT_ACCESS_EXPIRATION_MS: 3600000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      CORS_ALLOWED_ORIGINS: http://localhost
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - servicesphere-network
    restart: on-failure

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: servicesphere-frontend
    ports:
      - "80:80"            # localhost (port 80) pe accessible hoga
    depends_on:
      - backend
    networks:
      - servicesphere-network
    restart: on-failure

# ── Volumes & Networks ──────────────────────────────────────
volumes:
  mysql_data:

networks:
  servicesphere-network:
    driver: bridge